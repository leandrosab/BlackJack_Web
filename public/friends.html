<!DOCTYPE html>
<html lang="de" data-theme="midnight">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Freunde — Blackjack Royale</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div class="shell">
    <aside id="app-sidebar" class="sidebar"></aside>
    <main class="main">
      <div class="page-header">
        <h1>Freunde</h1>
        <p class="subtitle">Freunde adden, private Nachrichten senden, gemeinsam spielen.</p>
      </div>

      <div class="grid-2">
        <div>
          <div class="card">
            <h2>Freund hinzufügen</h2>
            <div class="row gap-8">
              <input class="input flex1" id="add-name" placeholder="Benutzername" maxlength="16" />
              <button class="btn primary" id="btn-add">Anfrage senden</button>
            </div>
          </div>

          <div class="card" id="req-card" style="display:none;">
            <h2>Offene Anfragen</h2>
            <div id="requests"></div>
          </div>

          <div class="card">
            <h2>Meine Freunde</h2>
            <div id="friends"><div class="empty">Lade…</div></div>
          </div>
        </div>

        <div>
          <div class="card" style="min-height: 500px; display: flex; flex-direction: column;">
            <h2 id="dm-header">Private Nachrichten</h2>
            <div id="dm-empty" class="empty flex1">Wähle links einen Freund für einen Chat.</div>
            <div id="dm-body" class="hidden" style="flex: 1; display: flex; flex-direction: column;">
              <div id="dm-log" style="flex:1; overflow-y:auto; padding: 4px; display: flex; flex-direction: column; gap: 6px; max-height: 500px;"></div>
              <div class="chat-input">
                <input class="input flex1" id="dm-input" placeholder="Nachricht…" maxlength="500" />
                <button class="btn primary" id="dm-send">Senden</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/app.js"></script>
  <script src="/js/friends.js"></script>
</body>
</html>
