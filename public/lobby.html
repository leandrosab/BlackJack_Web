<!DOCTYPE html>
<html lang="de" data-theme="midnight">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tische — Blackjack Royale</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" /><link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div class="shell">
    <aside id="app-sidebar" class="sidebar"></aside>

    <main class="main">
      <div class="page-header">
        <h1>Tische</h1>
        <p class="subtitle">Tritt einem Spiel bei oder eröffne deinen eigenen Tisch.</p>
      </div>

      <div class="grid-2">
        <div class="card">
          <div class="row" style="justify-content: space-between; margin-bottom: 12px;">
            <h2 style="margin: 0;">Offene Tische</h2>
            <button class="btn primary small" onclick="app.openModal('create-modal')">+ Neuer Tisch</button>
          </div>
          <div id="rooms-list"><div class="empty">Lade Tische…</div></div>
        </div>

        <div>
          <div class="card">
            <h2>Bestenliste</h2>
            <div id="leaderboard"><div class="empty">Lade…</div></div>
          </div>

          <div class="card">
            <h2>Regeln</h2>
            <ul style="color: var(--text-muted); line-height: 1.8; padding-left: 16px; font-size: 0.9rem;">
              <li>Min. Einsatz <b class="text-accent">10</b>, kein Maximum</li>
              <li>Blackjack zahlt <b class="text-accent">3:2</b></li>
              <li>Dealer zieht bis <b class="text-accent">17</b></li>
              <li>Bis zu 5 Spieler pro Tisch</li>
            </ul>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Create Room Modal -->
  <div class="modal-backdrop" id="create-modal">
    <div class="modal">
      <h2>Neuer Tisch <button class="close" onclick="app.closeModal('create-modal')">×</button></h2>
      <div class="field">
        <label>Name</label>
        <input id="new-name" placeholder="Mein Tisch" maxlength="30" />
      </div>
      <div class="field">
        <label>Sichtbarkeit</label>
        <select id="new-visibility">
          <option value="public">🌐 Öffentlich — jeder kann beitreten</option>
          <option value="friends">👥 Nur Freunde des Hosts</option>
          <option value="password">🔒 Passwort-geschützt</option>
        </select>
      </div>
      <div class="field hidden" id="pw-field">
        <label>Passwort</label>
        <input id="new-password" type="text" placeholder="Passwort für den Tisch" maxlength="30" />
      </div>
      <button class="btn primary block" id="btn-create-confirm">Tisch eröffnen</button>
    </div>
  </div>

  <script src="/js/app.js"></script>
  <script src="/js/lobby.js"></script>
</body>
</html>
