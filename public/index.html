<!DOCTYPE html>
<html lang="de" data-theme="midnight">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blackjack Royale</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div class="auth-wrap">
    <div class="auth-card">
      <div class="auth-brand">
        <div class="logo">♠</div>
        <h1>Blackjack Royale</h1>
        <p>Online-Blackjack mit Freunden — mit Fake-Credits.</p>
      </div>

      <div class="tabs">
        <div class="tab active" data-tab="login">Anmelden</div>
        <div class="tab" data-tab="register">Registrieren</div>
      </div>

      <div class="form-error" id="err"></div>

      <form id="login-form">
        <div class="field">
          <label>Benutzername</label>
          <input id="l-username" type="text" autocomplete="username" required />
        </div>
        <div class="field">
          <label>Passwort</label>
          <input id="l-password" type="password" autocomplete="current-password" required />
        </div>
        <button class="btn primary block" type="submit">Los geht's</button>
      </form>

      <form id="register-form" class="hidden">
        <div class="field">
          <label>Benutzername (3–16 Zeichen)</label>
          <input id="r-username" type="text" autocomplete="username" required minlength="3" maxlength="16" />
        </div>
        <div class="field">
          <label>Passwort (min. 6 Zeichen)</label>
          <input id="r-password" type="password" autocomplete="new-password" required minlength="6" />
        </div>
        <button class="btn primary block" type="submit">Konto erstellen</button>
        <p class="form-hint center mt-16">Start mit <b class="text-accent">1000 Credits</b>.</p>
      </form>
    </div>
  </div>

  <script src="/js/auth.js"></script>
</body>
</html>
