<!DOCTYPE html>
<html lang="de" data-theme="midnight">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tisch — Blackjack Royale</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div class="game-shell">
    <div class="game-top">
      <div class="row gap-12">
        <button class="btn small" onclick="leaveRoom()">← Lobby</button>
        <div class="title" id="table-title">Tisch</div>
      </div>
      <div class="row gap-12">
        <div id="me-info"></div>
      </div>
    </div>

    <div class="game-body">
      <div class="felt">
        <div class="felt-header">Blackjack · 3:2 · Dealer bis 17</div>

        <div class="dealer-area">
          <div class="dealer-label">Dealer</div>
          <div class="dealer-cards" id="dealer-cards"></div>
          <div class="hand-score" id="dealer-score">–</div>
        </div>

        <div class="players-area" id="players-area"></div>

        <div class="action-bar">
          <div class="phase-info" id="phase-info">Verbinde…</div>
          <div class="bet-controls hidden" id="bet-controls">
            <div class="chip c10" data-chip="10">10</div>
            <div class="chip c25" data-chip="25">25</div>
            <div class="chip c50" data-chip="50">50</div>
            <div class="chip c100" data-chip="100">100</div>
            <div class="chip c250" data-chip="250">250</div>
            <div class="bet-total"><span id="bet-total">0</span></div>
            <button class="btn small" id="btn-clear-bet">Reset</button>
            <button class="btn primary small" id="btn-place-bet">Setzen</button>
          </div>
          <div class="actions hidden" id="turn-actions">
            <button class="btn primary" data-action="hit">Karte</button>
            <button class="btn" data-action="stand">Passen</button>
            <button class="btn" data-action="double">Verdoppeln</button>
          </div>
        </div>
      </div>

      <aside class="side-panel">
        <div class="card chat-card">
          <h2>Tisch-Chat</h2>
          <div class="chat-log" id="chat-log"></div>
          <div class="chat-input">
            <input class="input flex1" id="chat-input" placeholder="Nachricht…" maxlength="200" />
            <button class="btn small primary" id="chat-send">Senden</button>
          </div>
        </div>
      </aside>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/app.js"></script>
  <script src="/js/game.js"></script>
</body>
</html>
